id: rate-limit-bypass
info:
  name: Rate Limit Bypass
  author: Guardian
  severity: medium
  description: Detects rate limiting bypass techniques
  tags: ddos,rate-limit,bypass

requests:
  - raw:
      - |
        GET /api/limited HTTP/1.1
        Host: {{Hostname}}
        X-Forwarded-For: 127.0.0.1
      - |
        GET /api/limited HTTP/1.1
        Host: {{Hostname}}
        X-Real-IP: 127.0.0.1
      - |
        GET /api/limited HTTP/1.1
        Host: {{Hostname}}
        User-Agent: RateLimitBypass/1.0
      - |
        GET /api/limited HTTP/1.1
        Host: {{Hostname}}
        X-Original-URI: /admin

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 201

      - type: word
        negative: true
        words:
          - "429"
          - "rate limit"

    payloads:
      X-Forwarded-For:
        - "127.0.0.1"
        - "10.0.0.1"
        - "192.168.1.1"
        - "169.254.169.254"
      X-Real-IP:
        - "127.0.0.1"
        - "localhost"
        - "0.0.0.0"

    attack: batteringram
    threads: 10
